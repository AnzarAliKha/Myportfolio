<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Tracker</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d1117; /* Dark background to match GitHub theme */
        }
    </style>
</head>
<body>

<script>
    // Private Visitor Tracker
window.addEventListener('load', function() {
    const scriptURL = "YOUR_SCRIPT_URL";
    const siteURL = window.location.href;
    const userAgent = navigator.userAgent;

    // We use 'no-cors' so it doesn't trigger security warnings
    fetch(`${scriptURL}?url=${encodeURIComponent(siteURL)}&ua=${encodeURIComponent(userAgent)}`, {
        mode: 'no-cors'
    });
});
</script>

</body>
</html>
